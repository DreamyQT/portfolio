<style>
  :root{
    --bg:#f4f6f9;
    --ink:#24304a;
    --dim:#5b6a80;
    --line:#dbe4ee;
    --accent:#3574c9;
    --accent-soft:#e7f0fb;
    --oak:#c9ad85;
    --warm:#f6efe4;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--ink);}
  canvas{display:block;}

  /* ---------- Loading screen ---------- */
  #loader{
    position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
    background:linear-gradient(180deg,#fbfcfe 0%,#eef3f8 100%);
    transition:opacity .8s ease, visibility .8s;
  }
  #loader.done{opacity:0;visibility:hidden;}
  .mini-chart{display:flex;align-items:flex-end;gap:8px;height:64px;}
  .mini-chart i{width:16px;border-radius:5px 5px 2px 2px;background:linear-gradient(180deg,#63a3e8,#3574c9);
    animation:grow 1.3s ease-in-out infinite;}
  .mini-chart i:nth-child(1){height:40%;animation-delay:0s}
  .mini-chart i:nth-child(2){height:70%;animation-delay:.15s}
  .mini-chart i:nth-child(3){height:52%;animation-delay:.3s}
  .mini-chart i:nth-child(4){height:88%;animation-delay:.45s}
  .mini-chart i:nth-child(5){height:62%;animation-delay:.6s}
  @keyframes grow{0%,100%{transform:scaleY(.75)}50%{transform:scaleY(1.08)}}
  #loader h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(22px,4vw,32px);letter-spacing:-.01em;color:var(--ink);}
  #loader h1 em{font-style:normal;color:var(--accent);}
  #loader .sub{font-size:14px;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);}
  .bar{width:min(280px,68vw);height:6px;border-radius:99px;background:var(--line);overflow:hidden;}
  .bar .fill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#63a3e8,#3574c9);transition:width .15s linear;}
  .pct{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--accent);font-variant-numeric:tabular-nums;}

  /* ---------- Hint chip ---------- */
  #hint{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:20;
    background:rgba(255,255,255,.9);border:1px solid var(--line);backdrop-filter:blur(8px);
    padding:10px 18px;border-radius:999px;font-size:14px;color:var(--ink);
    display:flex;align-items:center;gap:9px;opacity:0;transition:opacity .8s ease;pointer-events:none;white-space:nowrap;
    box-shadow:0 8px 24px rgba(36,48,74,.12);
  }
  #hint.show{opacity:1;}
  #hint .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(53,116,201,.7);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

  /* ---------- Name badge ---------- */
  #badge{position:fixed;top:22px;left:24px;z-index:20;opacity:0;transition:opacity 1s ease .3s;pointer-events:none;}
  #badge.show{opacity:1;}
  #badge .name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(19px,2.8vw,26px);color:var(--ink);
    text-shadow:0 1px 0 rgba(255,255,255,.8);}
  #badge .role{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-top:4px;font-weight:600;}

  /* ---------- Info panel ---------- */
  #overlay{
    position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:20px;
    background:rgba(36,48,74,.32);backdrop-filter:blur(5px);
    opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s;
  }
  #overlay.open{opacity:1;visibility:visible;}
  .card{
    width:min(580px,100%);max-height:min(80vh,700px);overflow-y:auto;overscroll-behavior:contain;
    background:#ffffff;color:var(--ink);border-radius:18px;padding:36px 36px 32px;position:relative;
    box-shadow:0 32px 80px rgba(24,38,66,.28), 0 0 0 1px var(--line);
    transform:translateY(14px) scale(.97);transition:transform .35s cubic-bezier(.2,.9,.25,1.2);
  }
  #overlay.open .card{transform:translateY(0) scale(1);}
  .card::-webkit-scrollbar{width:8px}
  .card::-webkit-scrollbar-thumb{background:#c4d3e6;border-radius:8px}
  .card .eyebrow{font-size:11.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px;}
  .card h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:29px;letter-spacing:-.01em;margin-bottom:18px;}
  .card p{font-size:15.5px;line-height:1.7;color:var(--dim);margin-bottom:12px;}
  .card p strong{color:var(--ink);}
  .card .close{
    position:absolute;top:16px;right:16px;width:36px;height:36px;border:1px solid var(--line);border-radius:50%;cursor:pointer;
    background:#f4f7fb;color:var(--dim);font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;
    transition:transform .2s, background .2s, color .2s;
  }
  .card .close:hover{background:var(--accent);color:#fff;transform:rotate(90deg);}
  .card .close:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .rule{height:1px;background:var(--line);margin:18px 0;}

  /* project rows */
  .case{display:flex;gap:14px;margin-bottom:18px;}
  .case .num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#b7c6da;min-width:30px;padding-top:2px;}
  .case .body{flex:1;}
  .case .title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16.5px;margin-bottom:4px;}
  .case .desc{font-size:14.5px;line-height:1.6;color:var(--dim);}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
  .tag{font-size:12px;font-weight:500;color:var(--accent);background:var(--accent-soft);padding:3px 10px;border-radius:999px;}

  /* skill groups */
  .skill-group{margin-bottom:15px;}
  .skill-group h3{font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:8px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{background:#f4f7fb;border:1px solid var(--line);color:var(--ink);font-size:13px;font-weight:500;
    padding:5px 12px;border-radius:999px;}
  .chip.gold{background:#fdf6e7;border-color:#ecd9ac;color:#8a6614;}

  /* contact rows */
  .link-row{display:flex;align-items:center;gap:13px;padding:13px 15px;margin-bottom:10px;border-radius:12px;
    background:#f7fafd;border:1px solid var(--line);text-decoration:none;color:var(--ink);
    transition:transform .18s, box-shadow .18s, border-color .18s;}
  .link-row:hover{transform:translateX(5px);box-shadow:0 8px 22px rgba(53,116,201,.14);border-color:#b6cfef;}
  .link-row .ico{font-size:19px;}
  .link-row .lbl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600;}
  .link-row .val{font-size:15px;font-weight:500;margin-top:2px;}
  .link-row div{display:flex;flex-direction:column;}

  /* resume */
  .job h3{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16.5px;margin-bottom:3px;}
  .job .meta{font-size:12.5px;letter-spacing:.08em;color:#8fa1b8;margin-bottom:8px;font-weight:500;}
  .job ul{margin:0 0 8px 18px;}
  .job li{font-size:14.5px;line-height:1.65;color:var(--dim);margin-bottom:4px;}
  .btn{
    display:inline-block;margin-top:8px;background:var(--accent);color:#fff;text-decoration:none;
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;
    padding:12px 22px;border-radius:12px;transition:background .2s, transform .2s, box-shadow .2s;
    box-shadow:0 8px 22px rgba(53,116,201,.3);
  }
  .btn:hover{background:#2a5ea6;transform:translateY(-2px);box-shadow:0 12px 26px rgba(53,116,201,.4);}
  .note{font-size:12.5px;color:#93a3b8;margin-top:10px;}
  .fun-tag{font-family:'Caveat',cursive;font-size:23px;color:var(--accent);}

  @media (max-width:640px){
    .card{padding:28px 20px 24px;border-radius:16px;}
    .card h2{font-size:24px;}
    #hint{font-size:12.5px;padding:9px 14px;bottom:18px;}
    #badge{top:16px;left:16px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s !important;transition-duration:.001s !important;}
  }
</style>
</head>

{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   Setup — bright daylight studio
============================================================ */
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 720;
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = !isMobile;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe6edf4);
scene.fog = new THREE.Fog(0xe6edf4, 26, 52);

const camera = new THREE.PerspectiveCamera(isMobile ? 42 : 36, window.innerWidth / window.innerHeight, 0.1, 100);
const CAM_START = new THREE.Vector3(20, 17, 20);
const CAM_END   = new THREE.Vector3(9.2, 7.2, 9.6);
const CAM_TARGET = new THREE.Vector3(-0.2, 1.4, -0.4);
camera.position.copy(CAM_START);
camera.lookAt(CAM_TARGET);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.copy(CAM_TARGET);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enablePan = false;
controls.minDistance = 6;
controls.maxDistance = 20;
controls.minPolarAngle = 0.4;
controls.maxPolarAngle = 1.42;
controls.enabled = false;

/* ============================================================
   Lights — soft daylight through the window
============================================================ */
scene.add(new THREE.HemisphereLight(0xdfeaff, 0xcdbb9e, 0.95));

const sun = new THREE.DirectionalLight(0xfff2dd, 2.0);
sun.position.set(-9, 9, 3);
if (!isMobile) {
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -10; sun.shadow.camera.right = 10;
  sun.shadow.camera.top = 10;  sun.shadow.camera.bottom = -10;
  sun.shadow.bias = -0.0004;
}
scene.add(sun);

const fill = new THREE.DirectionalLight(0xdce8f5, 0.5);
fill.position.set(8, 6, 8);
scene.add(fill);

// warm reading lamp glow (added with the floor lamp below)
const lampLight = new THREE.PointLight(0xffd9a8, 3.2, 6, 2);
lampLight.position.set(4.7, 2.05, -2.2);
scene.add(lampLight);

/* ============================================================
   Helpers (per-material hover snapshots — no stuck highlights)
============================================================ */
const clickables = [];

function mat(color, opts = {}) {
  return new THREE.MeshStandardMaterial({ color, roughness: opts.rough ?? 0.85, metalness: opts.metal ?? 0.0,
    emissive: opts.emissive ?? 0x000000, emissiveIntensity: opts.eInt ?? 1, ...(opts.extra || {}) });
}
function box(w, h, d, material, x = 0, y = 0, z = 0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
  m.position.set(x, y, z);
  m.castShadow = m.receiveShadow = !isMobile;
  return m;
}
function cyl(rt, rb, h, material, x = 0, y = 0, z = 0, seg = 20) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), material);
  m.position.set(x, y, z);
  m.castShadow = m.receiveShadow = !isMobile;
  return m;
}
function makeClickable(group, panel, label) {
  group.userData.panel = panel;
  group.userData.label = label;
  group.userData.baseScale = group.scale.clone();
  const hoverMats = new Map();
  group.traverse(o => {
    if (!o.isMesh) return;
    o.userData.root = group;
    const m = o.material;
    if (m && m.emissive && !m.userData.animated && !m.emissiveMap && !hoverMats.has(m)) {
      hoverMats.set(m, { hex: m.emissive.getHex(), int: m.emissiveIntensity });
    }
  });
  group.userData.hoverMats = hoverMats;
  clickables.push(group);
}

/* Canvas textures — redrawn once web fonts load */
const texRegistry = [];
function canvasTex(w, h, draw) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 4;
  texRegistry.push({ c, draw, t });
  return t;
}
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => {
    texRegistry.forEach(r => { r.draw(r.c.getContext('2d'), r.c.width, r.c.height); r.t.needsUpdate = true; });
  });
}
const SG = '"Space Grotesk", sans-serif';
const CV = '"Caveat", cursive';

/* --- Monitor dashboard (About) — clean light BI screen --- */
const dashboardTex = canvasTex(512, 300, (g, w, h) => {
  g.fillStyle = '#fbfcfe'; g.fillRect(0, 0, w, h);
  // header
  g.fillStyle = '#24304a'; g.font = `600 22px ${SG}`; g.textAlign = 'left'; g.textBaseline = 'middle';
  g.fillText('Sales Performance — Q2', 24, 30);
  g.fillStyle = '#3574c9'; g.fillRect(24, 46, 60, 4);
  // KPI cards
  const kpis = [['Revenue', '$1.2M', '#3574c9'], ['Growth', '+18%', '#2f9e6e'], ['Churn', '-2.1%', '#c9762f']];
  kpis.forEach((k, i) => {
    const x = 24 + i * 152;

function certTexture(title, year) {
  return canvasTex(300, 220, (g, w, h) => {
    g.fillStyle = '#fffef8'; g.fillRect(0, 0, w, h);
    g.strokeStyle = '#c8a44a'; g.lineWidth = 5; g.strokeRect(10, 10, w - 20, h - 20);
    g.strokeStyle = '#dbe4ee'; g.lineWidth = 2; g.strokeRect(20, 20, w - 40, h - 40);
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillStyle = '#8fa1b8'; g.font = `600 13px ${SG}`;
    g.fillText('CERTIFICATE', w/2, 48);
    g.fillStyle = '#24304a'; g.font = `700 20px ${SG}`;
    const lines = title.split('\n');
    lines.forEach((ln, i) => g.fillText(ln, w/2, 86 + i * 26));
    g.fillStyle = '#5b6a80'; g.font = `500 14px ${SG}`;
    g.fillText(year, w/2, 150);
    g.fillStyle = '#c8a44a'; g.beginPath(); g.arc(w/2 + 84, h - 46, 16, 0, Math.PI * 2); g.fill();
    g.strokeStyle = '#c8a44a'; g.lineWidth = 3;
    g.beginPath(); g.moveTo(w/2 - 90, h - 40); g.lineTo(w/2 + 30, h - 40); g.stroke();
  });
}

function plant(x, z, s = 1) {
  const g = new THREE.Group();
  g.add(cyl(0.22 * s, 0.17 * s, 0.34 * s, mat(0xd08a5a), 0, 0.17 * s, 0, 14));
  g.add(cyl(0.035 * s, 0.045 * s, 0.5 * s, mat(0x4a5e33), 0, 0.55 * s, 0, 8));
  const leafM = mat(0x5f8d4e, { rough: 0.8 });
  for (let i = 0; i < 6; i++) {
    const leaf = new THREE.Mesh(new THREE.IcosahedronGeometry(0.2 * s, 0), leafM);
    const a = (i / 6) * Math.PI * 2;
    leaf.position.set(Math.cos(a) * 0.2 * s, 0.85 * s + Math.sin(i * 2.3) * 0.1, Math.sin(a) * 0.2 * s);
    leaf.rotation.set(i, i * 1.7, i * 0.6);
    g.add(leaf);
  }
  const top = new THREE.Mesh(new THREE.IcosahedronGeometry(0.22 * s, 0), leafM);
  top.position.y = 1.05 * s; g.add(top);
  g.position.set(x, 0, z);
  scene.add(g);
}

/* ============================================================
   Interaction: hover glow + click panels
============================================================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-2, -2);
let hovered = null;

function setPointer(e) {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
}
renderer.domElement.addEventListener('pointermove', setPointer);
renderer.domElement.addEventListener('pointerleave', () => { pointer.set(-2, -2); clearHover(); });

function applyHover(group, on) {
  group.userData.targetScale = on ? 1.045 : 1.0;
  group.userData.hoverMats.forEach((base, m) => {
    if (on) {
      m.emissive.setHex(0x4a90d9);
      m.emissiveIntensity = Math.max(base.int, 0.22);
    } else {
      m.emissive.setHex(base.hex);
      m.emissiveIntensity = base.int;
    }
  });
}
function clearHover() {
  if (hovered) applyHover(hovered, false);
  hovered = null;
  document.body.style.cursor = 'default';
}

function pick() {
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(clickables, true);
  const root = hits.length ? hits[0].object.userData.root : null;
  if (root !== hovered) {
    if (hovered) applyHover(hovered, false);
    hovered = root;
    if (hovered) applyHover(hovered, true);
    document.body.style.cursor = hovered ? 'pointer' : 'default';
  }
}

let downX = 0, downY = 0;
renderer.domElement.addEventListener('pointerdown', (e) => { downX = e.clientX; downY = e.clientY; });
renderer.domElement.addEventListener('pointerup', (e) => {
  if (!controls.enabled) return;
  if (Math.hypot(e.clientX - downX, e.clientY - downY) > 8) return;
  setPointer(e); pick();
  if (hovered) openPanel(hovered.userData.panel);
});

/* ============================================================
   Panels
============================================================ */
const overlay = document.getElementById('overlay');
const panelContent = document.getElementById('panelContent');
const closeBtn = document.getElementById('closeBtn');

function openPanel(id) {
  const tpl = document.getElementById('tpl-' + id);
  if (!tpl) return;
  panelContent.innerHTML = '';
  panelContent.appendChild(tpl.content.cloneNode(true));
  overlay.classList.add('open');
  clearHover();
  closeBtn.focus({ preventScroll: true });
}
function closePanel() { overlay.classList.remove('open'); }
closeBtn.addEventListener('click', closePanel);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closePanel(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

/* ============================================================
   Loading + camera fly-in
============================================================ */
const loaderEl = document.getElementById('loader');
const pctEl = document.getElementById('pct');
const fillEl = document.getElementById('barFill');
let progress = 0, introT = -1;

function load() {
  progress = Math.min(100, progress + 1.6 + Math.random() * 2.4);
  pctEl.textContent = Math.floor(progress);
  fillEl.style.width = progress + '%';
  if (progress < 100) requestAnimationFrame(load);
  else setTimeout(() => {
    loaderEl.classList.add('done');
    introT = 0;
    if (reducedMotion) { camera.position.copy(CAM_END); introT = 1e9; finishIntro(); }
  }, 350);
}
load();

function finishIntro() {
  controls.enabled = true;
  document.getElementById('hint').classList.add('show');
  document.getElementById('badge').classList.add('show');
  setTimeout(() => document.getElementById('hint').classList.remove('show'), 9000);
}
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

/* ============================================================
   Animate
============================================================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  if (introT >= 0 && introT < 1) {
    introT = Math.min(1, introT + dt / 2.4);
    const k = easeOutCubic(introT);
    camera.position.lerpVectors(CAM_START, CAM_END, k);
    camera.lookAt(CAM_TARGET);
    if (introT >= 1) finishIntro();
  }

  if (controls.enabled && !overlay.classList.contains('open')) pick();

  for (const g of clickables) {
    const target = g.userData.targetScale ?? 1;
    const next = g.scale.x + (target * g.userData.baseScale.x - g.scale.x) * Math.min(1, dt * 10);
    g.scale.setScalar(next);
  }

  // wall clock keeps real time
  const now = new Date();
  if (secHand) {
    secHand.rotation.z  = -(now.getSeconds() / 60) * Math.PI * 2;
    minHand.rotation.z  = -((now.getMinutes() + now.getSeconds() / 60) / 60) * Math.PI * 2;
    hourHand.rotation.z = -(((now.getHours() % 12) + now.getMinutes() / 60) / 12) * Math.PI * 2;
  }

  // dust motes drifting in the light
  for (const m of motes) {
    const o = m.userData.o;
    m.position.set(
      o.x + Math.sin(t * 0.25 + o.p) * 0.25,
      o.y + Math.sin(t * 0.4 + o.p * 2) * 0.18,
      o.z + Math.cos(t * 0.2 + o.p) * 0.25
    );
    m.material.opacity = 0.22 + Math.sin(t * 0.8 + o.p) * 0.12;
  }

  // coffee steam
  for (const s of steamPuffs) {
    s.userData.t += dt * 0.35;
    if (s.userData.t > 1) s.userData.t = 0;
    const k = s.userData.t;
    s.position.set(
      cupWorldPos.x + Math.sin(k * 9) * 0.035,
      cupWorldPos.y + k * 0.5,
      cupWorldPos.z + Math.cos(k * 7) * 0.035
    );
    s.material.opacity = 0.3 * Math.sin(k * Math.PI);
    s.scale.setScalar(0.7 + k * 1.2);
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ============================================================
   Resize
============================================================ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
